services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: reptile-house-node-app:production
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      TRUST_PROXY: ${TRUST_PROXY:-1}
      PUBLIC_SERVER_URL: https://${DOMAIN:?DOMAIN is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-600}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-30}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_APP_USER:?MYSQL_APP_USER is required}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD:?MYSQL_APP_PASSWORD is required}
      DB_NAME: semo_reptile_house
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      BOOTSTRAP_ADMIN_SECRET: ${BOOTSTRAP_ADMIN_SECRET:?BOOTSTRAP_ADMIN_SECRET is required}
      AUTO_APPLY_SCHEMA: ${AUTO_APPLY_SCHEMA:-1}
      AUTO_SEED: ${AUTO_SEED:-0}
      STARTUP_DB_MAX_ATTEMPTS: ${STARTUP_DB_MAX_ATTEMPTS:-30}
      STARTUP_DB_RETRY_MS: ${STARTUP_DB_RETRY_MS:-2000}
    expose:
      - "3001"
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uploads_data:/app/server/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3001/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    image: reptile-house-node-db:production
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: semo_reptile_house
      MYSQL_USER: ${MYSQL_APP_USER:?MYSQL_APP_USER is required}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:?MYSQL_APP_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  caddy_data:
  caddy_config:
  mysql_data:
  uploads_data:
